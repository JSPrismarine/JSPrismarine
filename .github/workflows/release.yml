name: Release

on:
    push:
        branches:
            - master

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}

env:
    GITHUB_TOKEN: ${{ secrets.MACHINE_USER }}
    NPM_CONFIG_PROVENANCE: true
    HUSKY: 0

permissions:
    contents: write
    issues: write
    pull-requests: write
    id-token: write

jobs:
    release:
        name: 🚚 Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
            id-token: write
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0
                  submodules: 'recursive'

            - name: 🧬 Update submodules
              run: git submodule update --init --recursive

            - name: 📦 Install
              uses: ./.github/common/install

            - name: 🔨 Build
              run: pnpm run build

            - name: 🤝 Create Release Pull Request or Publish to NPM
              id: changesets
              uses: changesets/action@v1
              env:
                  NPM_TOKEN: ''
              with:
                  createGithubReleases: true
                  version: pnpm run version
                  publish: pnpm run release
                  setupGitUser: true
                  commit: |
                      Changeset: Increment package & dependecy versions.

                      Congratulations on the new release! 🎉
                      This is an automated commit triggered by the `release` workflow.
                  title: 🚀 Release packages

            - name: 🫨 Create Unstable Release
              if: steps.changesets.outputs.published != 'true'
              env:
                  NPM_TOKEN: ''
              run: |
                  git checkout master
                  pnpm run version:unstable
                  pnpm run release:unstable
